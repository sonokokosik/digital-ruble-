<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Финансовый детектив</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#2C2C2C;
color:#EAEAEA;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.chat{

width:420px;
background:#3A3A3A;
padding:25px;
border-radius:12px;

}

.message{

margin-bottom:15px;
padding:10px 15px;
border-radius:8px;
max-width:80%;

}

.bot{

background:#2F7F7F;

}

.buttons{

margin-top:20px;
display:flex;
gap:10px;

}

button{

padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;

}

.good{

background:#2ecc71;

}

.bad{

background:#c0392b;

}

</style>

</head>

<body>

<div class="chat">

<div class="message bot" id="question">

🦈 Акула-детектив:  
Тебе пишут:  
"Инвестируй сегодня и получи 40% прибыли за месяц!"

Это надёжное предложение?

</div>

<div class="buttons">

<button class="bad" onclick="answer(false)">Это мошенничество</button>

<button class="good" onclick="answer(true)">Это реальная инвестиция</button>

</div>

<div class="message bot" id="result"></div>

</div>

<script>

function answer(choice){

const result = document.getElementById("result");

if(!choice){

result.innerText = "Верно! ✔ Доходность 40% в месяц — типичный признак финансовой пирамиды.";

}

else{

result.innerText = "Неверно ❌ Такие обещания почти всегда означают мошенничество.";

}

}

</script>

</body>
</html>
