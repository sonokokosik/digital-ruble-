<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>Финансовый детектив</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:linear-gradient(#02121f,#06344f);
overflow:hidden;
}

/* контейнер игры */

#game{
max-width:900px;
margin:auto;
padding:40px;
position:relative;
z-index:2;
}

/* океанские пузыри */

.bubble{
position:absolute;
bottom:-100px;
width:20px;
height:20px;
background:rgba(255,255,255,0.2);
border-radius:50%;
animation:rise 12s infinite;
}

@keyframes rise{
0%{transform:translateY(0);}
100%{transform:translateY(-1200px);}
}

/* акула */

#shark{
font-size:120px;
animation:swim 4s infinite ease-in-out;
transition:0.3s;
}

@keyframes swim{
0%{transform:translateX(-20px);}
50%{transform:translateX(20px);}
100%{transform:translateX(-20px);}
}

.sharkHappy{
transform:scale(1.2);
}

.sharkAngry{
color:#ff4c4c;
transform:scale(1.2);
}

/* текст */

#question{
font-size:22px;
margin:30px 0;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:6px;
background:#2F7F7F;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#4A6572;
}

#result{
margin-top:20px;
min-height:30px;
font-size:18px;
}

#timer{
font-size:18px;
margin-top:10px;
color:#9fd3ff;
}

#score{
margin-top:10px;
}

#final{
display:none;
margin-top:40px;
}

</style>

</head>

<body>

<!-- пузыри -->

<div class="bubble" style="left:10%"></div>
<div class="bubble" style="left:20%;animation-duration:9s"></div>
<div class="bubble" style="left:35%;animation-duration:11s"></div>
<div class="bubble" style="left:55%;animation-duration:10s"></div>
<div class="bubble" style="left:75%;animation-duration:13s"></div>
<div class="bubble" style="left:90%;animation-duration:8s"></div>

<div id="game">

<h1>🦈 Финансовый детектив</h1>

<div id="shark">🦈</div>

<div id="timer"></div>

<div id="question">Нажми начать игру</div>

<div id="answers"></div>

<div id="result"></div>

<div id="score"></div>

<button id="startBtn" onclick="startGame()">Начать игру</button>

<div id="final">

<h2 id="finalText"></h2>

<button onclick="restart()">🔄 Сыграть ещё раз</button>

</div>

</div>

<script>

let level=0
let score=0
let timer=15
let timerInterval

const shark=document.getElementById("shark")

const questions=[

{
q:"Доходность 35% в месяц предлагает 'инвест-платформа'.",
answers:[
{text:"Это почти точно мошенничество",correct:true,phrase:"🦈 Отлично. Такие проценты нереальны."},
{text:"Это нормальная инвестиция",correct:false,phrase:"🦈 Нет. Это классическая финансовая пирамида."}
]
},

{
q:"Вам звонят и говорят перевести деньги на 'безопасный счёт'.",
answers:[
{text:"Это мошенники",correct:true,phrase:"🦈 Верно. Банки не используют 'безопасные счета'."},
{text:"Нужно срочно перевести",correct:false,phrase:"🦈 Опасная ошибка."}
]
},

{
q:"Кто выпускает цифровой рубль?",
answers:[
{text:"Центральный банк",correct:true,phrase:"🦈 Верно. Это государственная валюта."},
{text:"Коммерческие банки",correct:false,phrase:"🦈 Нет. Банки только посредники."}
]
},

{
q:"Почему цифровой рубль не приносит проценты?",
answers:[
{text:"Он не является банковским вкладом",correct:true,phrase:"🦈 Отлично. Это форма денег, а не депозит."},
{text:"Потому что технология не позволяет",correct:false,phrase:"🦈 Нет. Это экономическое решение."}
]
},

{
q:"Что означает 'программируемые деньги'?",
answers:[
{text:"Деньги можно тратить только на определённые цели",correct:true,phrase:"🦈 Верно. Например соцвыплаты."},
{text:"Деньги можно программировать как криптовалюту",correct:false,phrase:"🦈 Не совсем. Это другая концепция."}
]
}

]

function startGame(){

document.getElementById("startBtn").style.display="none"

showQuestion()

}

function showQuestion(){

if(level>=questions.length){

finish()

return

}

timer=15
updateTimer()

timerInterval=setInterval(countdown,1000)

const q=questions[level]

document.getElementById("question").innerText=q.q

const answersDiv=document.getElementById("answers")

answersDiv.innerHTML=""

q.answers.forEach(a=>{

const btn=document.createElement("button")

btn.innerText=a.text

btn.onclick=()=>answer(a)

answersDiv.appendChild(btn)

})

}

function countdown(){

timer--

updateTimer()

if(timer<=0){

clearInterval(timerInterval)

document.getElementById("result").innerText="🦈 Время вышло!"

level++

setTimeout(showQuestion,1000)

}

}

function updateTimer(){

document.getElementById("timer").innerText="⏱ Время: "+timer

}

function answer(a){

clearInterval(timerInterval)

document.getElementById("result").innerText=a.phrase

if(a.correct){

score++
shark.className="sharkHappy"

}else{

shark.className="sharkAngry"

}

updateScore()

setTimeout(()=>{

shark.className=""

level++

showQuestion()

},1500)

}

function updateScore(){

document.getElementById("score").innerText="Правильных ответов: "+score

}

function finish(){

document.getElementById("answers").style.display="none"
document.getElementById("question").style.display="none"
document.getElementById("timer").style.display="none"
document.getElementById("result").style.display="none"
document.getElementById("score").style.display="none"

document.getElementById("final").style.display="block"

let rating=""

if(score<=2) rating="🐟 Новичок"
else if(score<=4) rating="🦈 Финансовый детектив"
else rating="🏆 Ты финансово грамотен!"

document.getElementById("finalText").innerText="Результат: "+score+"/5 — "+rating

}

function restart(){

level=0
score=0

document.getElementById("final").style.display="none"

document.getElementById("answers").style.display="block"
document.getElementById("question").style.display="block"
document.getElementById("timer").style.display="block"
document.getElementById("result").style.display="block"
document.getElementById("score").style.display="block"

document.getElementById("startBtn").style.display="inline-block"

document.getElementById("question").innerText="Нажми начать игру"
document.getElementById("answers").innerHTML=""
document.getElementById("result").innerText=""
document.getElementById("score").innerText=""

}

</script>

</body>
</html>
