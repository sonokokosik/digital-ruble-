<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>Финансовый детектив</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#02121f,#06344f);
color:white;
text-align:center;
}

#gameContainer{
max-width:900px;
margin:auto;
padding:40px;
}

h1{
margin-bottom:10px;
}

#shark{
font-size:120px;
transition:0.3s;
}

.sharkHappy{
transform:scale(1.2);
}

.sharkAngry{
transform:scale(1.2);
color:#ff4c4c;
}

#question{
font-size:22px;
margin:30px 0;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:6px;
background:#2F7F7F;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#4A6572;
}

#result{
margin-top:20px;
font-size:18px;
min-height:30px;
}

#score{
margin-top:20px;
font-size:20px;
}

#finalScreen{
display:none;
margin-top:40px;
}

</style>

</head>

<body>

<div id="gameContainer">

<h1>🦈 Финансовый детектив</h1>

<div id="shark">🦈</div>

<div id="question">Нажми начать игру</div>

<div id="answers"></div>

<div id="result"></div>

<div id="score"></div>

<button onclick="startGame()">Начать игру</button>

<div id="finalScreen">
<h2 id="finalText"></h2>
<button onclick="restartGame()">🔄 Сыграть ещё раз</button>
</div>

</div>

<script>

let level=0
let score=0

const shark=document.getElementById("shark")

const questions=[

{
q:"Вам предлагают инвестицию с доходностью 30% в месяц.",
answers:[
{text:"Это подозрительно",correct:true,phrase:"🦈 Пахнет мошенничеством!"},
{text:"Это хорошая инвестиция",correct:false,phrase:"🦈 Слишком наивно..."}
]
},

{
q:"Вам пишет 'служба поддержки банка' в Telegram.",
answers:[
{text:"Это мошенники",correct:true,phrase:"🦈 Верно. Банки не пишут первыми."},
{text:"Это нормально",correct:false,phrase:"🦈 Опасная ошибка."}
]
},

{
q:"Где хранятся цифровые рубли?",
answers:[
{text:"На платформе Центрального банка",correct:true,phrase:"🦈 Отлично. Ты знаешь систему."},
{text:"На банковской карте",correct:false,phrase:"🦈 Не совсем. Это другая форма денег."}
]
},

{
q:"Цифровой рубль — это криптовалюта?",
answers:[
{text:"Нет",correct:true,phrase:"🦈 Верно. Его выпускает государство."},
{text:"Да",correct:false,phrase:"🦈 Нет. Криптовалюты децентрализованы."}
]
},

{
q:"Программируемые деньги могут ограничивать использование средств?",
answers:[
{text:"Да",correct:true,phrase:"🦈 Верно. Например социальные выплаты."},
{text:"Нет",correct:false,phrase:"🦈 На самом деле могут."}
]
}

]

function startGame(){

document.querySelector("button").style.display="none"

showQuestion()

}

function showQuestion(){

if(level>=questions.length){

finishGame()

return

}

const q=questions[level]

document.getElementById("question").innerText=q.q

const answersDiv=document.getElementById("answers")

answersDiv.innerHTML=""

q.answers.forEach(a=>{

const btn=document.createElement("button")

btn.innerText=a.text

btn.onclick=()=>answer(a)

answersDiv.appendChild(btn)

})

}

function answer(a){

document.getElementById("result").innerText=a.phrase

if(a.correct){

score++

shark.className="sharkHappy"

}else{

shark.className="sharkAngry"

}

setTimeout(()=>{

shark.className=""

level++

showQuestion()

updateScore()

},1200)

}

function updateScore(){

document.getElementById("score").innerText="Правильных ответов: "+score

}

function finishGame(){

document.getElementById("question").style.display="none"

document.getElementById("answers").style.display="none"

document.getElementById("result").style.display="none"

document.getElementById("score").style.display="none"

document.getElementById("finalScreen").style.display="block"

let rating=""

if(score<=2){

rating="🐟 Новичок"

}

else if(score<=4){

rating="🦈 Финансовый детектив"

}

else{

rating="🏆 Ты финансово грамотен!"

}

document.getElementById("finalText").innerText="Результат: "+score+"/5 — "+rating

}

function restartGame(){

level=0
score=0

document.getElementById("finalScreen").style.display="none"

document.getElementById("question").style.display="block"
document.getElementById("answers").style.display="block"
document.getElementById("result").style.display="block"
document.getElementById("score").style.display="block"

document.querySelector("button").style.display="inline-block"

document.getElementById("question").innerText="Нажми начать игру"

document.getElementById("answers").innerHTML=""
document.getElementById("result").innerText=""
document.getElementById("score").innerText=""

}

</script>

</body>
</html>
